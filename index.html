<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="數獨">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>數獨</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header>
      <h1>數獨</h1>
      <div id="timer">00:00</div>
    </header>

    <!-- Theme -->
    <div id="theme-bar">
      <button class="theme-btn active" data-theme="ocean" title="海洋">🌊</button>
      <button class="theme-btn" data-theme="forest" title="森林">🌲</button>
      <button class="theme-btn" data-theme="sunset" title="夕陽">🌅</button>
      <button class="theme-btn" data-theme="lavender" title="薰衣草">🪻</button>
      <button class="theme-btn" data-theme="midnight" title="午夜">🌑</button>
    </div>

    <!-- Difficulty -->
    <div id="difficulty-bar">
      <button class="diff-btn active" data-diff="easy">簡單</button>
      <button class="diff-btn" data-diff="medium">中等</button>
      <button class="diff-btn" data-diff="hard">困難</button>
    </div>

    <!-- Board -->
    <div id="board-wrap">
      <div id="board"></div>
    </div>

    <!-- Controls -->
    <div id="controls">
      <button id="btn-note" class="ctrl-btn" title="筆記模式">
        <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
        筆記
      </button>
      <button id="btn-erase" class="ctrl-btn" title="清除">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm-9 14H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V7h2v2zm4 8h-2v-2h2v2zm0-4h-2v-2h2v2zm0-4h-2V7h2v2zm4 8h-2v-2h2v2zm0-4h-2v-2h2v2zm0-4h-2V7h2v2z"/></svg>
        清除
      </button>
      <button id="btn-hint" class="ctrl-btn" title="提示">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg>
        提示
      </button>
      <button id="btn-new" class="ctrl-btn" title="新遊戲">
        <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        新局
      </button>
    </div>

    <!-- Numpad -->
    <div id="numpad">
      <button class="num-btn" data-num="1">1</button>
      <button class="num-btn" data-num="2">2</button>
      <button class="num-btn" data-num="3">3</button>
      <button class="num-btn" data-num="4">4</button>
      <button class="num-btn" data-num="5">5</button>
      <button class="num-btn" data-num="6">6</button>
      <button class="num-btn" data-num="7">7</button>
      <button class="num-btn" data-num="8">8</button>
      <button class="num-btn" data-num="9">9</button>
    </div>

    <!-- Win overlay -->
    <div id="win-overlay" class="hidden">
      <div id="win-box">
        <div id="win-emoji">🎉</div>
        <h2>完成了！</h2>
        <p id="win-time"></p>
        <button id="win-new">再來一局</button>
      </div>
    </div>
  </div>

  <script src="sudoku.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
