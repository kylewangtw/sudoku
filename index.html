<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#fff3e6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="數獨">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>數獨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

  <!-- Plain JS (no JSX) -->
  <script src="src/theme.js"></script>
  <script src="src/engine.js"></script>

  <!-- JSX components (transpiled by Babel) -->
  <script type="text/babel" src="src/board.jsx"></script>
  <script type="text/babel" src="src/controls.jsx"></script>
  <script type="text/babel" src="src/reducer.jsx"></script>
  <script type="text/babel" src="src/screens.jsx"></script>

  <!-- App entry point -->
  <script type="text/babel">
    function useWindowWidth() {
      const [width, setWidth] = React.useState(window.innerWidth);
      React.useEffect(() => {
        const onResize = () => setWidth(window.innerWidth);
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, []);
      return width;
    }

    function App() {
      const [currentTheme, setCurrentTheme] = React.useState(
        () => localStorage.getItem('sudoku-theme') || 'peach'
      );
      const [state, dispatch] = React.useReducer(
        window.sudokuReducer,
        null,
        window.createInitialState
      );
      const windowWidth = useWindowWidth();
      const theme = window.THEMES[currentTheme] || window.THEMES.peach;
      const isTablet = windowWidth >= 768;

      // Persist theme
      React.useEffect(() => {
        localStorage.setItem('sudoku-theme', currentTheme);
      }, [currentTheme]);

      // Timer
      React.useEffect(() => {
        if (state.won) return;
        const tick = setInterval(() => dispatch({ type: 'TICK' }), 1000);
        return () => clearInterval(tick);
      }, [state.won]);

      // Auto-clear celebration
      React.useEffect(() => {
        if (state.celebrate) {
          const t = setTimeout(() => dispatch({ type: 'CLEAR_CELEBRATE' }), 1200);
          return () => clearTimeout(t);
        }
      }, [state.celebrate && state.celebrate.id]);

      // Keyboard
      React.useEffect(() => {
        const onKey = (e) => {
          if (state.won) return;
          if (e.key >= '1' && e.key <= '9') {
            dispatch({ type: 'INPUT_NUMBER', num: parseInt(e.key) });
          } else if (e.key === 'Backspace' || e.key === 'Delete' || e.key === '0') {
            dispatch({ type: 'ERASE' });
          } else if (e.key.toLowerCase() === 'n') {
            dispatch({ type: 'NOTES' });
          } else if (e.key.toLowerCase() === 'h') {
            dispatch({ type: 'HINT' });
          } else if (
            e.key.toLowerCase() === 'u' ||
            (e.key.toLowerCase() === 'z' && (e.metaKey || e.ctrlKey))
          ) {
            dispatch({ type: 'UNDO' });
          } else if (e.key === 'ArrowUp' && state.selected) {
            dispatch({ type: 'SELECT', r: Math.max(0, state.selected.r - 1), c: state.selected.c });
          } else if (e.key === 'ArrowDown' && state.selected) {
            dispatch({ type: 'SELECT', r: Math.min(8, state.selected.r + 1), c: state.selected.c });
          } else if (e.key === 'ArrowLeft' && state.selected) {
            dispatch({ type: 'SELECT', r: state.selected.r, c: Math.max(0, state.selected.c - 1) });
          } else if (e.key === 'ArrowRight' && state.selected) {
            dispatch({ type: 'SELECT', r: state.selected.r, c: Math.min(8, state.selected.c + 1) });
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [state.selected, state.won]);

      const gameProps = { state, dispatch, theme, onThemeChange: setCurrentTheme, currentTheme };

      return isTablet
        ? <window.TabletGame {...gameProps} />
        : <window.MobileGame {...gameProps} />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
